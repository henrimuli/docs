# Copy this file to your docs repo as:
#   .github/workflows/trigger-hivra-docs-ingest.yml
#
# GitHub repo secrets (henrimuli/docs → Settings → Secrets):
#   HIVRA_DOCS_INGEST_URL    = https://hivra.app/api/cron/docs-ingest
#   HIVRA_DOCS_INGEST_SECRET = same value as DOCS_INGEST_SECRET on Vercel

name: Trigger Hivra docs ingest

on:
  push:
    branches: [main]

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: POST ingest endpoint
        env:
          INGEST_URL: ${{ secrets.HIVRA_DOCS_INGEST_URL }}
          INGEST_SECRET: ${{ secrets.HIVRA_DOCS_INGEST_SECRET }}
        run: |
          if [ -z "$INGEST_URL" ]; then
            echo "Missing secret: HIVRA_DOCS_INGEST_URL"
            exit 1
          fi
          if [ -z "$INGEST_SECRET" ]; then
            echo "Missing secret: HIVRA_DOCS_INGEST_SECRET"
            exit 1
          fi

          if [[ ! "$INGEST_URL" =~ ^https?:// ]]; then
            echo "Invalid HIVRA_DOCS_INGEST_URL: must start with http:// or https://"
            exit 1
          fi

          echo "Triggering ingest at: $INGEST_URL"
          response=$(curl -sS -w "\n%{http_code}" -X POST "$INGEST_URL" \
            -H "Authorization: Bearer $INGEST_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"source":"henrimuli-docs-push"}')

          http_code=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | sed '$d')

          echo "Ingest response: $body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Ingest failed with HTTP $http_code"
            exit 1
          fi
